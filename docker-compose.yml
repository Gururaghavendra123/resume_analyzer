version: "3.9"

services:
  # ── FastAPI Backend ──────────────────────────────────────────
  api:
    build: ./backend
    container_name: analyzer-api
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./backend:/app
      - ./uploads:/app/uploads
    depends_on:
      qdrant:
        condition: service_started
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped

  # ── Celery Worker ────────────────────────────────────────────
  worker:
    build: ./backend
    container_name: analyzer-worker
    env_file: .env
    volumes:
      - ./backend:/app
      - ./uploads:/app/uploads
    depends_on:
      - redis
      - qdrant
      - postgres
    command: celery -A workers.tasks worker --loglevel=info --concurrency=4
    restart: unless-stopped

  # ── Qdrant Vector DB ────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: analyzer-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  # ── PostgreSQL ───────────────────────────────────────────────
  postgres:
    image: postgres:15
    container_name: analyzer-postgres
    environment:
      POSTGRES_DB: analyzer
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
    ports:
      - "5433:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d analyzer"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Redis ────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: analyzer-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  qdrant_data:
  pg_data:
  redis_data:
